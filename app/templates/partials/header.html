<header class="site-header">
    <div class="container header-inner">
        <a href="/" class="brand-mark" aria-label="KYBBY home">
            <img class="brand-mark__logo" src="{{ url_for('static', path='img/kybby-whale.png') }}" alt="KYBBY" />
            <span class="brand-mark__text">KYBBY</span>
        </a>

        <nav class="header-actions">
            {% if request.session.get('user_id') %}
            <a href="/app/projects" class="btn btn-primary">Мои проекты</a>
            <a href="/app/profile" class="header-user-pill header-user-pill--link">{{ request.session.get('user_name')
                }}</a>
            <a href="/logout" class="btn btn-outline">Выйти</a>
            {% else %}
            <a href="/login" class="btn btn-outline">Вход</a>
            <a href="/register" class="btn btn-primary">Регистрация</a>
            {% endif %}
        </nav>
    </div>
</header>
