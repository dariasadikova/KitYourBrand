<header class="site-header">
    <div class="container header-inner">
        <a href="/" class="brand-mark" aria-label="KitYourBrand home">
            <span class="brand-mark__dot"></span>
            <span class="brand-mark__text">KITYOURBRAND</span>
        </a>

        <nav class="header-actions">
            {% if request.session.get('user_id') %}
            <div class="header-user-pill">{{ request.session.get('user_name') }}</div>
            <a href="/logout" class="btn btn-outline">Выйти</a>
            {% else %}
            <a href="/login" class="btn btn-outline">Войти</a>
            <a href="/register" class="btn btn-primary">Регистрация</a>
            {% endif %}
        </nav>
    </div>
</header>
