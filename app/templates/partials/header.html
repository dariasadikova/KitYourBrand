<header class="site-header">
    <div class="container header-inner">
        <a href="/" class="brand-mark" aria-label="KitYourBrand home">
            <span class="brand-mark__dot" aria-hidden="true">
                <svg class="brand-mark__sparkle" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1" />
                    <circle cx="12" cy="12" r="2.8" fill="currentColor" stroke="none" />
                </svg>
            </span>
            <span class="brand-mark__text">KITYOURBRAND</span>
        </a>

        <nav class="header-actions">
            {% if request.session.get('user_id') %}
            <a href="/dashboard" class="btn btn-primary">Мои проекты</a>
            <a href="/profile" class="header-user-pill header-user-pill--link">{{ request.session.get('user_name')
                }}</a>
            <a href="/logout" class="btn btn-outline">Выйти</a>
            {% else %}
            <a href="/login" class="btn btn-outline">Войти</a>
            <a href="/register" class="btn btn-primary">Регистрация</a>
            {% endif %}
        </nav>
    </div>
</header>
